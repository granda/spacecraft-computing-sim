services:
  node1:
    build: .
    hostname: node1
    restart: on-failure
    environment:
      ION_NODE_NUM: "1"
      ION_CONFIG_DIR: /ion/configs
    cap_add:
      - IPC_OWNER
      # NET_ADMIN added in degraded-links phase for tc netem
    shm_size: 128m
    healthcheck:
      test: ["CMD-SHELL", "echo v | ionadmin 2>&1 | grep -qi ion-open-source && pgrep -x bpecho > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    volumes:
      - ./configs/node1:/ion/configs:ro
    networks:
      - dtn-net

  node2:
    build: .
    hostname: node2
    restart: on-failure
    environment:
      ION_NODE_NUM: "2"
      ION_CONFIG_DIR: /ion/configs
    cap_add:
      - IPC_OWNER
      # NET_ADMIN added in degraded-links phase for tc netem
    shm_size: 128m
    # node2 waits for node1 — prevents race at LTP span setup (udplso resolves node1 hostname)
    depends_on:
      node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "echo v | ionadmin 2>&1 | grep -qi ion-open-source && pgrep -x bpecho > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    volumes:
      - ./configs/node2:/ion/configs:ro
    networks:
      - dtn-net

networks:
  dtn-net:
    driver: bridge
