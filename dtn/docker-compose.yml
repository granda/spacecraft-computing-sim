# Linux capabilities (cap_add) grant specific kernel privileges to containers
# without running them as fully privileged. Docker drops most capabilities by
# default; we add back only the two ION needs:
#   IPC_OWNER  — lets ION create/attach System V shared-memory segments that
#                its daemons use for inter-process state (SDR datastore).
#   NET_ADMIN  — allows 'tc netem' traffic-control rules for simulating
#                degraded space links (latency, packet loss, outages).
#                Only node1 (spacecraft) needs it; node2 (ground) is the
#                clean endpoint.
services:
  node1:
    build: .
    hostname: node1
    restart: on-failure
    environment:
      ION_NODE_NUM: "1"
      ION_CONFIG_DIR: /ion/configs
    cap_add:
      - IPC_OWNER
      - NET_ADMIN
    shm_size: 128m
    healthcheck:
      test: ["CMD-SHELL", "echo v | ionadmin 2>&1 | grep -qi ion-open-source && pgrep -x bpecho > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    volumes:
      - ./configs/node1:/ion/configs:ro
    networks:
      - dtn-net

  node2:
    build: .
    hostname: node2
    restart: on-failure
    environment:
      ION_NODE_NUM: "2"
      ION_CONFIG_DIR: /ion/configs
    cap_add:
      - IPC_OWNER
    shm_size: 128m
    # node2 waits for node1 — prevents race at LTP span setup (udplso resolves node1 hostname)
    depends_on:
      node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "echo v | ionadmin 2>&1 | grep -qi ion-open-source && pgrep -x bpecho > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    volumes:
      - ./configs/node2:/ion/configs:ro
    networks:
      - dtn-net

networks:
  dtn-net:
    driver: bridge
