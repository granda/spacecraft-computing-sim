name: "Build: DTN"

on:
  push:
    branches: [main]
    paths:
      - dtn/**
      - .github/workflows/build-dtn.yml
  pull_request:
    paths:
      - dtn/**
      - .github/workflows/build-dtn.yml

jobs:
  dtn:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Build and test dtn
        run: make -C dtn test
