name: "Build: Integration"

on:
  push:
    branches: [main]
    paths:
      - integration/**
      - freertos/**
      - .github/actions/install-toolchain/**
      - .github/workflows/build-integration.yml
  pull_request:
    paths:
      - integration/**
      - freertos/**
      - .github/actions/install-toolchain/**
      - .github/workflows/build-integration.yml

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      - uses: ./.github/actions/install-toolchain
      - name: Build and test integration
        run: make -C integration test
      - name: Capture QEMU output for debugging
        if: failure()
        run: timeout 15 qemu-system-arm -machine mps2-an385 -cpu cortex-m3 -nographic -kernel integration/build/firmware.elf > /tmp/qemu.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: qemu-output
          path: /tmp/qemu.log
