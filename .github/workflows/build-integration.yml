name: "Build: Integration"

on:
  push:
    branches: [main]
    paths:
      - integration/**
      - freertos/**
      - dtn/Dockerfile
      - dtn/scripts/ionstart.sh
      - dtn/scripts/test_basic.py
      - .github/actions/install-toolchain/**
      - .github/workflows/build-integration.yml
  pull_request:
    paths:
      - integration/**
      - freertos/**
      - dtn/Dockerfile
      - dtn/scripts/ionstart.sh
      - dtn/scripts/test_basic.py
      - .github/actions/install-toolchain/**
      - .github/workflows/build-integration.yml

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      - uses: ./.github/actions/install-toolchain
      - name: Build and test integration
        run: make -C integration test
      - name: Capture QEMU output for debugging
        if: failure()
        run: timeout 15 qemu-system-arm -machine mps2-an385 -cpu cortex-m3 -nographic -kernel integration/build/firmware.elf > /tmp/qemu.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: qemu-output
          path: /tmp/qemu.log

  # NOTE: freertos/** in the workflow path trigger means this job also runs on
  # firmware-only changes.  Acceptable for a learning project; split into a
  # separate workflow if CI minutes become a concern.
  ground-station:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      - name: Build and test ground station
        run: make -C integration test-ground-station
      - name: Capture container logs for debugging
        if: failure()
        run: |
          cd integration
          docker compose logs > /tmp/ground-station.log 2>&1 || true
          docker compose down --timeout 5 --volumes 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ground-station-logs
          path: /tmp/ground-station.log
