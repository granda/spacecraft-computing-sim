name: "Build: Phase 2"

on:
  push:
    branches: [main]
    paths:
      - phase2/**
      - .github/actions/install-toolchain/**
      - .github/workflows/build-phase2.yml
  pull_request:
    paths:
      - phase2/**
      - .github/actions/install-toolchain/**
      - .github/workflows/build-phase2.yml

jobs:
  phase2:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      - uses: ./.github/actions/install-toolchain
      - name: Build and test phase2
        run: make -C phase2 test
